<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RaaS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F7F6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .post { background: #FFF; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 10px; width: 100%; max-width: 500px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #E8F5E9; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn:hover { background: #C8E6C9; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, query, orderBy, onSnapshot,
        serverTimestamp, updateDoc, doc, increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // КОНФИГУРАЦИЯ
    const firebaseConfig = {
        apiKey: "AIzaSyBD8ksqaZhKvx5X5yg7uNbuCmwkM9i1vug",
        authDomain: "registerasddwqwqrf.firebaseapp.com",
        projectId: "registerasddwqwqrf",
        storageBucket: "registerasddwqwqrf.firebasestorage.app",
        messagingSenderId: "96075486903",
        appId: "1:96075486903:web:e15506574d299351f19f32",
        measurementId: "G-L1ESE7TD5D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) {
            console.error("Ошибка обновления:", e);
        }
    };

    // Далее в файле обычно идет логика обработки нажатия на mainBtn 
    // и подписка на обновления коллекции (onSnapshot) для вывода в #feed.
</script>

</body>
</html>
