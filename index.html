<!DOCTYPE html>

<body>

<h2>Отправка данных</h2>

<input id="name" placeholder="Имя">
<button onclick="send()">Отправить</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBD8ksqaZhKvx5X5yg7uNbuCmwkM9i1vug",
  authDomain: "registerasddwqwqrf.firebaseapp.com",
  projectId: "registerasddwqwqrf",
  storageBucket: "registerasddwqwqrf.firebasestorage.app",
  messagingSenderId: "96075486903",
  appId: "1:96075486903:web:e15506574d299351f19f32",
  measurementId: "G-L1ESE7TD5D"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

const db = getFirestore(app);

window.send = async function() {
 const name = document.getElementById("name").value;

 await addDoc(collection(db, "requests"), {
   name: name
 });

 alert("Отправлено!");
}

</script>

</body>
